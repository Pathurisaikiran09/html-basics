<!DOCTYPE html>
<html>
    <body>
        <h1>Unordered List</h1>
        <ul>
            <li>tea</li>
            <li>coffe</li>
            <li>Milk</li>
        </ul>
        <h1>Ordered List</h1>
        <ol>
            <li>Apple</li>
            <li>Mango</li>
            <li>Banana</li>
        </ol>
        <h1>Description List</h1>
        <dl>
            <dt>Tea</dt>
            <dd>Lemon Tea</dd>
            <dd>Green Tea</dd>
        </dl>
    </body>
</html>
