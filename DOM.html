<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>DOM Example</title>
</head>
<body>


    <h1 id="title">Welcome</h1>


    <input type="text">

  
    <button
        type="button"
        onclick="document.getElementById('title').textContent='Welcome to DOM'">
        Click me
    </button>

  
    <p id="intro">Finding HTML elements</p>

    <p id="demo"></p>

    
    <p class="msg">Hi</p>
    <p class="msg">This is Sai Kiran</p>

    <script>

        // Function to change the heading text
        function changeText() {
            document.getElementById("title").textContent = "Welcome";
        }
        changeText();

        // Change the heading color to blue
        document.getElementById("title").style.color = "blue";

        // Get the paragraph with id="demo"
        const myPara = document.getElementById("demo");

        // Change its text
        myPara.textContent = "Hello World";

        // Get the paragraph with id="intro"
        const intro = document.getElementById("intro");

        // Change its color
        intro.style.color = "green";

        // Change its font
        intro.style.fontFamily = "Arial";

        // Get all elements having class="msg"
        const messages = document.getElementsByClassName("msg");

        // Display the first class element inside demo paragraph
        myPara.textContent =
            "The First Paragraph is: " + messages[0].textContent;

        // Display second class element in console
        console.log(messages[1].textContent);

    </script>

</body>
</html>
